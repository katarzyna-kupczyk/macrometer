<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{background:#F4F1FB;font-family:'IBM Plex Sans',system-ui,sans-serif;color:#241E33}
  .mono{font-family:'IBM Plex Mono',ui-monospace,monospace;font-feature-settings:"tnum" 1;letter-spacing:-.02em}
  .brico{font-family:'Bricolage Grotesque',system-ui}
  .scr{max-width:440px;margin:0 auto;min-height:100vh;min-height:100dvh;position:relative;display:flex;flex-direction:column;background:#F4F1FB;color:#241E33}
  .body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-top:calc(env(safe-area-inset-top) + 6px);padding-bottom:8px}
  .body::-webkit-scrollbar{width:0}
  .dnav{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:6px 20px 4px}
  .dnav button{width:36px;height:36px;border-radius:12px;display:grid;place-items:center;font-size:20px;border:none;background:#E6DEFA;color:#241E33;cursor:pointer}
  .dnav button:active{background:#D8CCF5}
  .gearbtn{width:36px;height:36px;border-radius:12px;display:grid;place-items:center;border:none;background:#E6DEFA;color:#241E33;cursor:pointer}
  .pill{cursor:pointer}
  .tabbar{display:flex;flex:none;padding:8px 6px calc(env(safe-area-inset-bottom) + 10px);background:#fff;align-items:flex-end}
  .tb{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;font:600 10px 'IBM Plex Sans';background:none;border:none;cursor:pointer;color:#B7A9DA}
  .tb svg{width:22px;height:22px;fill:none;stroke:currentColor;stroke-width:1.9}
  .tb.on{color:#FF6B4A}
  .fab{width:54px;height:54px;border-radius:19px;background:#FF6B4A;color:#fff;display:grid;place-items:center;font-size:30px;border:none;cursor:pointer;box-shadow:0 8px 18px -4px rgba(255,107,74,.6)}
  .fab:active{background:#F0562F}
  .card{background:#fff;border-radius:18px}
  .addbtn{width:100%;padding:12px;border:1.5px dashed #D3C8F0;border-radius:16px;background:rgba(255,255,255,.5);color:#8B6FE8;font:600 13px 'IBM Plex Sans';cursor:pointer}
  .addbtn:active{background:rgba(255,255,255,.9)}
  input{font-family:inherit;font-size:16px}
  .fi{width:100%;padding:12px 13px;border:1px solid #E3DCF3;border-radius:12px;background:#fff;color:#241E33;outline:none}
  .fi:focus{border-color:#8B6FE8}
  .flab{display:block;font:600 10px 'IBM Plex Sans';text-transform:uppercase;letter-spacing:.08em;color:#8878B0;margin-bottom:5px}
  .ov{position:fixed;inset:0;z-index:50;background:rgba(36,30,51,.42);display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .2s}
  .ov.show{opacity:1;pointer-events:auto}
  .sheet{width:100%;max-width:440px;margin:0 auto;background:#F4F1FB;border-radius:26px 26px 0 0;max-height:94vh;max-height:94dvh;display:flex;flex-direction:column;padding-bottom:env(safe-area-inset-bottom);transform:translateY(24px);transition:transform .22s ease}
  .ov.show .sheet{transform:translateY(0)}
  .seg{display:flex;gap:4px;padding:2px 16px 12px}
  .seg button{flex:1;padding:9px 4px;border-radius:11px;font:600 12px 'IBM Plex Sans';color:#8878B0;background:#fff;border:none;cursor:pointer}
  .seg button.on{background:#FF6B4A;color:#fff}
  .prim{width:100%;padding:14px;border-radius:15px;background:#FF6B4A;color:#fff;font:700 15px 'IBM Plex Sans';border:none;cursor:pointer}
  .prim:active{background:#F0562F}
  .reader{width:100%;border-radius:14px;overflow:hidden;margin-bottom:10px}
  .toast{position:fixed;left:50%;bottom:calc(90px + env(safe-area-inset-bottom));transform:translateX(-50%);background:#241E33;color:#fff;padding:10px 18px;border-radius:22px;font:500 13.5px 'IBM Plex Sans';z-index:80;opacity:0;transition:opacity .2s;max-width:86%;text-align:center;box-shadow:0 8px 22px rgba(0,0,0,.25)}
  .toast.show{opacity:1}
  @keyframes pop{from{transform:translateY(28px)}to{transform:translateY(0)}}
</style>
</head>
<body>
<div class="scr"><div class="body" id="app"></div><div class="tabbar" id="tabs"></div></div>
<div class="ov" id="ov"><div class="sheet" id="sheet"></div></div>
<div class="toast" id="toast"></div>
<script>
/* ============ config ============ */
const MICROS=[
  {key:'fiber',label:'Fibre',unit:'g',dir:'floor',group:'Carbohydrate quality'},
  {key:'sugars',label:'Sugars',unit:'g',dir:'ceil',group:'Carbohydrate quality'},
  {key:'satfat',label:'Saturated fat',unit:'g',dir:'ceil',group:'Fat quality'},
  {key:'sodium',label:'Sodium',unit:'mg',dir:'ceil',group:'Minerals'},
  {key:'potassium',label:'Potassium',unit:'mg',dir:'floor',group:'Minerals'},
  {key:'calcium',label:'Calcium',unit:'mg',dir:'floor',group:'Minerals'},
  {key:'iron',label:'Iron',unit:'mg',dir:'floor',group:'Minerals'},
  {key:'vitc',label:'Vitamin C',unit:'mg',dir:'floor',group:'Vitamins'},
  {key:'vitd',label:'Vitamin D',unit:'µg',dir:'floor',group:'Vitamins'},
];
const MKEYS=MICROS.map(m=>m.key);
const ALL=['kcal','p','c','f',...MKEYS];
const KEY='macrometer.v3';
const CHIPS=['#FDEFD6','#E4F5EF','#EAE3FB'];
const DEFAULT={
  view:'today', cur:todayKey(new Date()),
  targets:{kcal:1465,p:115,c:150,f:45,fiber:30,sugars:50,satfat:20,sodium:2300,potassium:3500,calcium:1000,iron:15,vitc:80,vitd:10},
  foods:[], log:{}, meals:['Breakfast','Lunch','Dinner','Snacks']
};
let S=load();
// transient UI (not persisted)
let sheetOpen=false, sheetMode='search', addTarget='Breakfast', createFood=false;
let query='', results=[], searching=false, draft=blankDraft(), scanner=null, searchT=null;

function load(){try{const r=localStorage.getItem(KEY);if(r){const j=JSON.parse(r);
  const s=structuredClone(DEFAULT);Object.assign(s,j);
  s.targets=Object.assign({},DEFAULT.targets,j.targets||{});s.cur=todayKey(new Date());return s;}}catch(e){}
  return structuredClone(DEFAULT);}
function save(){try{localStorage.setItem(KEY,JSON.stringify({targets:S.targets,foods:S.foods,log:S.log,meals:S.meals}));}catch(e){toast('Could not save — storage blocked');}}

/* ============ helpers ============ */
function todayKey(d){const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),dd=String(d.getDate()).padStart(2,'0');return y+'-'+m+'-'+dd;}
function keyToDate(k){const[y,m,d]=k.split('-').map(Number);return new Date(y,m-1,d);}
function shiftDay(k,n){const d=keyToDate(k);d.setDate(d.getDate()+n);return todayKey(d);}
function niceDate(k){const d=keyToDate(k),t=keyToDate(todayKey(new Date()));const diff=Math.round((d-t)/86400000);
  const long=d.toLocaleDateString(undefined,{weekday:'long',month:'short',day:'numeric'});
  if(diff===0)return{big:'Today',small:long};if(diff===-1)return{big:'Yesterday',small:long};if(diff===1)return{big:'Tomorrow',small:long};
  return{big:d.toLocaleDateString(undefined,{weekday:'short',month:'short',day:'numeric'}),small:''+d.getFullYear()};}
const R=n=>Math.round(n||0);
const r1=n=>Math.round((n||0)*10)/10;
function num(x){const n=parseFloat(x);return isFinite(n)?n:0;}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function blankDraft(){return{name:'',serving:'',kcal:'',p:'',c:'',f:'',qty:1,emoji:'🍽️',chip:'#EAE3FB'};}
function mkEntry(f,qty){const b={};for(const k of ALL)b[k]=f.base[k]||0;return{id:uid(),name:f.name,serving:f.serving,emoji:f.emoji||'🍽️',chip:f.chip||'#EAE3FB',base:b,qty:qty||1};}
function entryTotals(e){const q=e.qty||1,o={};for(const k of ALL)o[k]=(e.base[k]||0)*q;return o;}
function dayTotals(k){const day=S.log[k]||{};const t={};for(const key of ALL)t[key]=0;
  for(const m of S.meals)for(const e of (day[m]||[])){const et=entryTotals(e);for(const key of ALL)t[key]+=et[key];}return t;}
const EMOJI=[[/yog|yoghurt|yogurt|milk|cream/,'🥛','#EAE3FB'],[/oat|porridge|cereal|granola/,'🥣','#FDEFD6'],
  [/chicken|turkey|beef|pork|steak|meat|ham/,'🍖','#E4F5EF'],[/salmon|fish|tuna|cod|prawn|shrimp/,'🐟','#E4F5EF'],
  [/egg/,'🥚','#FDEFD6'],[/banana/,'🍌','#FDEFD6'],[/apple/,'🍎','#E4F5EF'],[/berry|berries|strawb|blueb|rasp/,'🫐','#EAE3FB'],
  [/salad|spinach|lettuce|kale|veg|broccoli|greens/,'🥬','#E4F5EF'],[/almond|nut|peanut|cashew|walnut/,'🥜','#EAE3FB'],
  [/cheese|cheddar|brie|feta/,'🧀','#FDEFD6'],[/bread|toast|bagel|roll/,'🍞','#FDEFD6'],[/rice|quinoa|pasta|noodle/,'🍚','#FDEFD6'],
  [/chocolate|cake|biscuit|cookie|sweet|candy/,'🍫','#EAE3FB'],[/coffee|latte|espresso/,'☕','#FDEFD6'],[/tea/,'🍵','#E4F5EF'],
  [/juice|smoothie|drink|soda|cola/,'🥤','#EAE3FB'],[/potato|chip|fries/,'🥔','#FDEFD6'],[/avocado/,'🥑','#E4F5EF'],[/pizza/,'🍕','#FDEFD6']];
function pickMeta(name){const n=(name||'').toLowerCase();for(const[re,e,c]of EMOJI)if(re.test(n))return{emoji:e,chip:c};
  return{emoji:'🍽️',chip:CHIPS[Math.abs(hash(n))%CHIPS.length]};}
function hash(s){let h=0;for(let i=0;i<s.length;i++)h=(h*31+s.charCodeAt(i))|0;return h;}

/* ============ render dispatch ============ */
function render(){document.getElementById('app').innerHTML=
    ({today:vToday,nutrients:vNutrients,trends:vTrends,foods:vFoods,settings:vSettings}[S.view])();
  document.getElementById('tabs').innerHTML=tabbar();bindApp();}
function tabbar(){const on=v=>S.view===v?'on':'';
  const ic={today:'<path d="M3 11l9-8 9 8"></path><path d="M5 10v10h14V10"></path>',
    foods:'<path d="M4 5a2 2 0 0 1 2-2h12v18H6a2 2 0 0 1-2-2z"></path><path d="M8 3v18"></path>',
    trends:'<path d="M4 20V10"></path><path d="M10 20V4"></path><path d="M16 20v-7"></path><path d="M22 20H2"></path>',
    settings:'<circle cx="12" cy="12" r="3"></circle><path d="M12 3v2M12 19v2M3 12h2M19 12h2M6 6l1.5 1.5M16.5 16.5L18 18M18 6l-1.5 1.5M7.5 16.5L6 18"></path>'};
  return `<button class="tb ${on('today')}" data-go="today"><svg viewBox="0 0 24 24">${ic.today}</svg>Today</button>
    <button class="tb ${on('foods')}" data-go="foods"><svg viewBox="0 0 24 24">${ic.foods}</svg>Foods</button>
    <div style="flex:0 0 auto;margin:0 6px 4px"><button class="fab" data-addfab="1">+</button></div>
    <button class="tb ${on('trends')}" data-go="trends"><svg viewBox="0 0 24 24">${ic.trends}</svg>Trends</button>
    <button class="tb ${on('settings')}" data-go="settings"><svg viewBox="0 0 24 24">${ic.settings}</svg>Settings</button>`;}

/* ============ Today ============ */
function microSummary(t){let met=0,tracked=0;const groups={};const flat=[];
  const hasData=ALL.some(k=>(t[k]||0)>0);
  for(const m of MICROS){const tv=S.targets[m.key]||0;if(!tv)continue;tracked++;const cv=t[m.key];
    const ok=m.dir==='floor'?cv>=tv*0.999:(hasData&&cv<=tv);if(ok)met++;const pct=tv?Math.min(100,cv/tv*100):0;
    let fill,readC;if(m.dir==='floor'){fill=ok?'#10B085':'#B9D8CE';readC=ok?'#10B085':'#241E33';}
    else{const over=cv>tv;fill=over?'#E8442A':'#F5A623';readC=over?'#E8442A':'#241E33';}
    const row={label:m.label,unit:m.unit,cur:r1(cv),target:R(tv),pct,fill,readC,
      tag:m.dir==='floor'?'AIM ▲':'MAX ▼',tagBg:m.dir==='floor'?'rgba(16,176,133,.12)':'rgba(245,166,35,.16)',tagC:m.dir==='floor'?'#0E9E77':'#D98A1E'};
    (groups[m.group]=groups[m.group]||[]).push(row);flat.push({label:m.label,unit:m.unit,target:R(tv)});}
  return{met,tracked,groups,flat};}

function vToday(){const cur=S.cur,tg=S.targets,t=dayTotals(cur),nd=niceDate(cur);
  const calPct=Math.min(1,tg.kcal?t.kcal/tg.kcal:0),calRem=tg.kcal-t.kcal,ringOffset=540*(1-calPct);
  const ms=microSummary(t);
  let dots='';for(let i=0;i<Math.min(5,ms.tracked);i++)dots+=`<span style="width:8px;height:8px;border-radius:2px;background:${i<ms.met?'#10B085':'#E6DEFA'};display:inline-block;margin-left:3px"></span>`;
  const mcard=(name,col,bg,tr,cur_,pct,fillc,lt)=>`<div style="flex:1;background:${bg};border-radius:18px;padding:11px 12px"><div style="font:700 10px 'IBM Plex Sans';text-transform:uppercase;letter-spacing:.06em;color:${col}">${name}</div><div class="mono" style="font-size:19px;font-weight:600;margin:3px 0 6px">${R(cur_)}<span style="font-size:11px;color:${lt}">g</span></div><div style="height:6px;border-radius:4px;background:${tr};overflow:hidden"><div style="height:100%;background:${fillc};border-radius:4px;width:${pct}%;transition:width .4s"></div></div></div>`;
  let meals='';for(const name of S.meals){const items=(S.log[cur]||{})[name]||[];let kc=0;items.forEach(e=>kc+=entryTotals(e).kcal);
    let rows='';for(const e of items){rows+=`<button data-del="${name}|${e.id}" style="width:100%;display:flex;align-items:center;padding:11px 12px;background:none;border:none;text-align:left;cursor:pointer">
      <div style="width:30px;height:30px;border-radius:10px;background:${e.chip};display:grid;place-items:center;font-size:15px;margin-right:11px">${e.emoji}</div>

function openSheet(mode,target){sheetOpen=true;sheetMode=mode;addTarget=target||S.meals[0];createFood=false;query='';results=[];draft=blankDraft();renderSheet();showOv(true);}

function paneSaved(){if(!S.foods.length)return `<div style="font-size:12.5px;color:#A99BCB;padding:14px 2px;line-height:1.5">No saved foods yet. Create foods from the Foods tab.</div>`;

/* ============ Open Food Facts (Search-a-licious text search) ============ */
async function runSearch(term){searching=true;results=[];updateResults();
  try{const url='https://search.openfoodfacts.org/search?q='+encodeURIComponent(term)+'&page_size=20&lang=en&fields=code,product_name,brands,nutriments,serving_size';
    const r=await fetch(url);if(!r.ok)throw new Error('http '+r.status);
    const j=await r.json();const hits=j.hits||j.products||[];
    const items=hits.map(salToFood).filter(f=>f&&f.name&&(f.base.kcal||f.base.p||f.base.c||f.base.f));
    if(query.trim()!==term)return; // stale
    results=items.slice(0,20);searching=false;updateResults();
  }catch(e){if(query.trim()!==term)return;searching=false;results=[];updateResults(true);}}
function updateResults(err){const box=document.getElementById('results');if(!box)return;
  if(searching){box.innerHTML=`<div style="text-align:center;color:#A99BCB;padding:22px;font-size:13px">Searching…</div>`;return;}
  if(err){box.innerHTML=`<div style="font-size:12.5px;color:#A99BCB;padding:14px 2px;line-height:1.5">Couldn't reach Open Food Facts (check connection). Use Manual.</div>`;return;}
  box.innerHTML=paneSearchResultsInner();}
function paneSearchResultsInner(){if(results.length)return results.map((r,i)=>`<div style="display:flex;align-items:center;gap:10px;padding:11px 2px;border-bottom:1px solid #EAE4F6">
    <div style="width:32px;height:32px;border-radius:10px;background:${r.chip};display:grid;place-items:center;font-size:15px">${r.emoji}</div>
    <div style="flex:1;min-width:0"><b style="font-weight:600;font-size:14px;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(r.name)}</b><small style="color:#8878B0;font-size:12px">${esc(r.serving)} · ${R(r.base.kcal)} kcal</small></div>
    <button data-pick="${i}" style="width:34px;height:34px;border-radius:11px;background:#FF6B4A;color:#fff;font-size:22px;border:none;cursor:pointer">+</button></div>`).join('');
  return `<div style="font-size:12.5px;color:#A99BCB;padding:14px 2px;line-height:1.5">${query.trim()?'No matches. Try another word, or add it in Manual.':'Type a food to search Open Food Facts. Needs internet.'}</div>`;}
function buildFood(n,name,brand,serving_size){n=n||{};
  const basis=(n['energy-kcal_serving']!=null&&serving_size)?'_serving':'_100g';const g=k=>num(n[k+basis]);
  const base={};for(const k of ALL)base[k]=0;
  base.kcal=g('energy-kcal')||num(n['energy-kcal'])||num(n['energy-kcal_value']);
  base.p=g('proteins');base.c=g('carbohydrates');base.f=g('fat');
  base.fiber=g('fiber');base.sugars=g('sugars');base.satfat=g('saturated-fat');
  base.sodium=n['sodium'+basis]!=null?g('sodium')*1000:(n['salt'+basis]!=null?g('salt')/2.5*1000:0);
  base.potassium=g('potassium')*1000;base.calcium=g('calcium')*1000;base.iron=g('iron')*1000;
  base.vitc=g('vitamin-c')*1000;base.vitd=g('vitamin-d')*1000000;
  const meta=pickMeta(name+' '+(brand||''));
  return{name:brand?name+' · '+brand:name,serving:basis==='_serving'?serving_size:'100 g',emoji:meta.emoji,chip:meta.chip,base};}
function offToFood(p){if(!p)return null;const name=(p.product_name||p.generic_name||'').trim();if(!name)return null;
  return buildFood(p.nutriments,name,(p.brands||'').split(',')[0].trim(),p.serving_size);}
function pickStr(v){if(v==null)return '';if(typeof v==='string')return v;if(typeof v==='object')return v.en||Object.values(v).find(x=>typeof x==='string')||'';return ''+v;}
function salToFood(h){if(!h)return null;
  const name=(pickStr(h.product_name)||pickStr(h.generic_name)).trim();if(!name)return null;
  const brand=pickStr(h.brands).split(',')[0].trim();
  return buildFood(h.nutriments,name,brand,h.serving_size);}

/* ============ Scanner ============ */
function startScan(){if(typeof Html5Qrcode==='undefined')return;
  try{scanner=new Html5Qrcode('reader',{formatsToSupport:[Html5QrcodeSupportedFormats.EAN_13,Html5QrcodeSupportedFormats.EAN_8,Html5QrcodeSupportedFormats.UPC_A,Html5QrcodeSupportedFormats.UPC_E]});
    scanner.start({facingMode:'environment'},{fps:10,qrbox:{width:250,height:150}},onScan,()=>{}).catch(e=>{const m=document.getElementById('scanmsg');if(m)m.textContent='Camera unavailable. Use Search or Manual.';});
  }catch(e){}}
async function stopScan(){if(scanner){try{await scanner.stop();scanner.clear();}catch(e){}scanner=null;}}
async function onScan(code){await stopScan();const m=document.getElementById('scanmsg');if(m)m.textContent='Looking up '+code+'…';
  try{const r=await fetch('https://world.openfoodfacts.org/api/v2/product/'+encodeURIComponent(code)+'.json?fields=product_name,generic_name,brands,nutriments,serving_size');
    const j=await r.json();if(j.status===1||j.product){const f=offToFood(j.product);if(f){draft=food2draft(f);sheetMode='manual';renderSheet();toast('Found: '+f.name);return;}}
    sheetMode='manual';draft=blankDraft();renderSheet();toast('Not found — enter manually');}catch(e){sheetMode='manual';renderSheet();toast('Lookup failed');}}
function food2draft(f){return{name:f.name,serving:f.serving,kcal:R(f.base.kcal),p:r1(f.base.p),c:r1(f.base.c),f:r1(f.base.f),qty:1,emoji:f.emoji,chip:f.chip,base:f.base};}

/* ============ mutations ============ */
function addFoodToLog(f){const log=structuredClone(S.log);log[S.cur]=log[S.cur]||{};log[S.cur][addTarget]=log[S.cur][addTarget]||[];
  log[S.cur][addTarget].push(mkEntry(f,f.qty||1));S.log=log;save();sheetOpen=false;showOv(false);render();toast('Added to '+addTarget);}
function commitManual(){readDraft();if(!draft.name){toast('Give it a name');return;}
  const base={};for(const k of ALL)base[k]=0;
  if(draft.base)for(const k of ALL)base[k]=draft.base[k]||0;
  base.kcal=num(draft.kcal);base.p=num(draft.p);base.c=num(draft.c);base.f=num(draft.f);
  const meta=pickMeta(draft.name);
  const f={name:draft.name,serving:draft.serving||'1 serving',emoji:draft.emoji||meta.emoji,chip:draft.chip||meta.chip,base,qty:draft.qty};
  if(createFood){S.foods.push({id:uid(),name:f.name,serving:f.serving,emoji:f.emoji,chip:f.chip,base});save();sheetOpen=false;showOv(false);render();toast('Saved to My Foods');}
  else addFoodToLog(f);}
function readDraft(){const body=document.getElementById('sheet');if(!body)return;
  body.querySelectorAll('[data-d]').forEach(el=>{draft[el.dataset.d]=el.value;});}
function delEntry(meal,id){const log=structuredClone(S.log);if(log[S.cur]&&log[S.cur][meal])log[S.cur][meal]=log[S.cur][meal].filter(e=>e.id!==id);S.log=log;save();render();}

/* ============ data mgmt ============ */
function exportData(){const blob=new Blob([JSON.stringify({targets:S.targets,foods:S.foods,log:S.log,meals:S.meals})],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='macrometer-backup-'+todayKey(new Date())+'.json';a.click();setTimeout(()=>URL.revokeObjectURL(a.href),2000);}
function importData(){const inp=document.createElement('input');inp.type='file';inp.accept='.json,application/json';
  inp.onchange=()=>{const fl=inp.files[0];if(!fl)return;const rd=new FileReader();rd.onload=()=>{try{const j=JSON.parse(rd.result);
    S.targets=Object.assign({},DEFAULT.targets,j.targets||{});S.foods=j.foods||[];S.log=j.log||{};S.meals=j.meals||S.meals;save();render();toast('Restored');}catch(e){toast('Could not read that file');}};rd.readAsText(fl);};inp.click();}
function clearDay(){const log=structuredClone(S.log);log[S.cur]={Breakfast:[],Lunch:[],Dinner:[],Snacks:[]};S.log=log;save();render();toast("Today's log cleared");}

/* ============ overlay/toast ============ */
function showOv(v){const o=document.getElementById('ov');if(v)o.classList.add('show');else{o.classList.remove('show');stopScan();}}
let toastT;function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),2100);}

/* ============ binding ============ */
function bindApp(){document.getElementById('app').onclick=e=>{const t=e.target.closest('[data-go],[data-day],[data-add],[data-del],[data-createfood],[data-export],[data-import],[data-clear]');if(!t)return;const d=t.dataset;
    if(d.go){S.view=d.go;render();}
    else if(d.day){S.cur=shiftDay(S.cur,+d.day);render();}
    else if(d.add){openSheet('search',d.add);}
    else if(d.del){const[m,id]=d.del.split('|');delEntry(m,id);}
    else if(d.createfood){sheetOpen=true;createFood=true;sheetMode='manual';addTarget=S.meals[0];draft=blankDraft();renderSheet();showOv(true);}
    else if(d.export){exportData();}
    else if(d.import){importData();}
    else if(d.clear){clearDay();}};
  document.getElementById('app').oninput=e=>{const t=e.target;if(t.dataset.tgt){S.targets[t.dataset.tgt]=num(t.value);save();}};
  document.getElementById('tabs').onclick=e=>{const t=e.target.closest('[data-go],[data-addfab]');if(!t)return;
    if(t.dataset.addfab){openSheet('search',S.meals[0]);}else{S.view=t.dataset.go;render();}};}
function bindSheet(){const s=document.getElementById('sheet');
  s.onclick=e=>{const t=e.target.closest('[data-close],[data-mode],[data-pick],[data-picksaved],[data-qty],[data-commit]');if(!t)return;const d=t.dataset;
    if(d.close!=null){sheetOpen=false;showOv(false);}
    else if(d.mode){readDraft();if(sheetMode==='scan')stopScan();sheetMode=d.mode;renderSheet();if(d.mode==='scan')setTimeout(startScan,120);}
    else if(d.pick!=null){addFoodToLog(results[+d.pick]);}
    else if(d.picksaved!=null){addFoodToLog({...S.foods[+d.picksaved],qty:1});}
    else if(d.qty){readDraft();draft.qty=Math.max(0.5,Math.round((draft.qty+(+d.qty)*0.5)*10)/10);renderSheet();}
    else if(d.commit!=null){commitManual();}};
  s.oninput=e=>{const t=e.target;
    if(t.id==='q'){query=t.value;if(!query.trim()){results=[];searching=false;updateResults();}}
    else if(t.dataset.d){draft[t.dataset.d]=t.value;}};
  s.onkeydown=e=>{if(e.key==='Enter'&&e.target.id==='q'){e.preventDefault();const term=e.target.value.trim();if(term.length>=2)runSearch(term);}};}
document.getElementById('ov').addEventListener('click',e=>{if(e.target.id==='ov'){sheetOpen=false;showOv(false);}});

render();
</script>
